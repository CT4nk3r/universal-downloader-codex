name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to create, for example v0.4.0
        required: true
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  android-release-tests:
    name: Android release tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./android/gradlew

      - name: Build release APK and run release unit tests
        run: |
          cd android
          ./gradlew testReleaseUnitTest assembleRelease --stacktrace
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false

  android-unit-tests:
    name: Android unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./android/gradlew

      - name: Run Android unit tests and coverage
        run: |
          cd android
          ./gradlew testDebugUnitTest jacocoTestReport jacocoCoverageVerification --stacktrace
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false

  android-e2e-tests:
    name: Android e2e tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./android/gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            adb shell input keyevent KEYCODE_WAKEUP
            adb shell wm dismiss-keyguard
            adb shell input keyevent KEYCODE_MENU
            cd android && ./gradlew connectedDebugAndroidTest --stacktrace

  ios-unit-tests:
    name: iOS unit tests
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: ios

      - name: Select simulator
        id: simulator
        run: echo "destination=$(python3 scripts/select_ios_destination.py)" >> "$GITHUB_OUTPUT"

      - name: Run iOS unit tests with coverage
        run: |
          mkdir -p build/ios
          xcodebuild test \
            -project ios/UniversalDownloader.xcodeproj \
            -scheme UniversalDownloader \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -only-testing:UniversalDownloaderTests \
            -enableCodeCoverage YES \
            -resultBundlePath build/ios/UniversalDownloaderUnitTests.xcresult

      - name: Export iOS unit coverage
        run: |
          mkdir -p build/coverage/ios
          xcrun xccov view --report --json build/ios/UniversalDownloaderUnitTests.xcresult > build/coverage/ios/coverage.json
          python3 scripts/ios_coverage_report.py \
            --input build/coverage/ios/coverage.json \
            --output build/coverage/ios \
            --threshold 100 \
            --include "/Shared/"

  ios-e2e-tests:
    name: iOS e2e tests
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: ios

      - name: Select simulator
        id: simulator
        run: echo "destination=$(python3 scripts/select_ios_destination.py)" >> "$GITHUB_OUTPUT"

      - name: Run iOS UI tests
        run: |
          mkdir -p build/ios
          xcodebuild test \
            -project ios/UniversalDownloader.xcodeproj \
            -scheme UniversalDownloader \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -only-testing:UniversalDownloaderUITests \
            -resultBundlePath build/ios/UniversalDownloaderUITests.xcresult

  ios-sideload-ipa:
    name: Build unsigned iOS IPA
    runs-on: macos-latest
    needs:
      - ios-unit-tests
      - ios-e2e-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: ios

      - name: Build unsigned device app
        run: |
          xcodebuild build \
            -project ios/UniversalDownloader.xcodeproj \
            -scheme UniversalDownloader \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/ios-derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package unsigned IPA
        run: |
          app_path="build/ios-derived/Build/Products/Release-iphoneos/UniversalDownloader.app"
          ipa_path="build/UniversalDownloader-${{ inputs.version }}-unsigned.ipa"

          if [ ! -d "$app_path" ]; then
            echo "::error::Expected app bundle was not created at $app_path"
            exit 1
          fi

          rm -rf build/ios-ipa
          mkdir -p build/ios-ipa/Payload
          cp -R "$app_path" build/ios-ipa/Payload/
          (cd build/ios-ipa && /usr/bin/zip -qry "../UniversalDownloader-${{ inputs.version }}-unsigned.ipa" Payload)
          shasum -a 256 "$ipa_path" | tee "$ipa_path.sha256"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-ipa
          path: |
            build/UniversalDownloader-${{ inputs.version }}-unsigned.ipa
            build/UniversalDownloader-${{ inputs.version }}-unsigned.ipa.sha256
          retention-days: 90

  signed-apk-release:
    name: Sign APK, tag, and publish release
    runs-on: ubuntu-latest
    needs:
      - android-release-tests
      - android-unit-tests
      - android-e2e-tests
      - ios-unit-tests
      - ios-e2e-tests
      - ios-sideload-ipa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release version
        run: |
          if ! printf '%s' "${{ inputs.version }}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            echo "::error::Release version must look like v0.4.0"
            exit 1
          fi
          if git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./android/gradlew

      - name: Validate signing secrets
        run: |
          missing=0
          for name in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name GitHub secret is required for signed release builds"
              missing=1
            fi
          done
          exit "$missing"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Decode keystore
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/android-release.keystore"
          chmod 600 "$RUNNER_TEMP/android-release.keystore"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build signed release APK
        run: |
          cd android
          ./gradlew testReleaseUnitTest assembleRelease --stacktrace
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false
          KEYSTORE_FILE: ${{ runner.temp }}/android-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Download unsigned iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: unsigned-ios-ipa
          path: release-assets/ios

      - name: Compute release hash and notes
        id: hash
        run: |
          apk="android/app/build/outputs/apk/release/app-release.apk"
          sha256sum "$apk" | tee app-release.apk.sha256
          hash="$(cut -d ' ' -f 1 app-release.apk.sha256)"
          echo "sha256=$hash" >> "$GITHUB_OUTPUT"
          cat > release-notes.md <<EOF
          Universal Downloader ${{ inputs.version }}

          Android APK SHA-256:

          \`$hash\`

          Unsigned iOS IPA for AltStore/Sideloadly:

          \`UniversalDownloader-${{ inputs.version }}-unsigned.ipa\`

          The iOS IPA is not App Store signed. Installers such as AltStore or Sideloadly must re-sign it with the user's Apple ID before it can run on a device.
          EOF

      - name: Create and push release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Create GitHub Release
        run: |
          prerelease_flag=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "${{ inputs.version }}" \
            "android/app/build/outputs/apk/release/app-release.apk#UniversalDownloader-${{ inputs.version }}.apk" \
            "app-release.apk.sha256#UniversalDownloader-${{ inputs.version }}.apk.sha256" \
            "release-assets/ios/UniversalDownloader-${{ inputs.version }}-unsigned.ipa#UniversalDownloader-${{ inputs.version }}-unsigned.ipa" \
            "release-assets/ios/UniversalDownloader-${{ inputs.version }}-unsigned.ipa.sha256#UniversalDownloader-${{ inputs.version }}-unsigned.ipa.sha256" \
            --title "Universal Downloader ${{ inputs.version }}" \
            --notes-file release-notes.md \
            $prerelease_flag
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            app-release.apk.sha256
            release-assets/ios/UniversalDownloader-${{ inputs.version }}-unsigned.ipa
            release-assets/ios/UniversalDownloader-${{ inputs.version }}-unsigned.ipa.sha256
          retention-days: 90

      - name: Clean up keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/android-release.keystore"
