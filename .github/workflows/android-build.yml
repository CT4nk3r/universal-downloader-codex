name: Mobile CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  android-release-tests:
    name: Android release tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./android/gradlew

      - name: Build release APK and run release unit tests
        run: |
          cd android
          ./gradlew testReleaseUnitTest assembleRelease --stacktrace
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false

      - name: Upload Android release test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-test-reports
          path: android/app/build/reports/tests/testReleaseUnitTest/
          retention-days: 30

      - name: Upload unsigned release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: ignore

  android-unit-tests:
    name: Android unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./android/gradlew

      - name: Run Android unit tests and coverage
        run: |
          cd android
          ./gradlew testDebugUnitTest jacocoTestReport jacocoCoverageVerification --stacktrace
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false

      - name: Upload Android unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-reports
          path: android/app/build/reports/tests/testDebugUnitTest/
          retention-days: 30

      - name: Upload Android coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-coverage
          path: android/app/build/reports/jacoco/jacocoTestReport/
          retention-days: 30

  android-e2e-tests:
    name: Android e2e tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./android/gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            adb shell input keyevent KEYCODE_WAKEUP
            adb shell wm dismiss-keyguard
            adb shell input keyevent KEYCODE_MENU
            cd android && ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Upload Android e2e reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-reports
          path: android/app/build/reports/androidTests/
          retention-days: 30

  ios-unit-tests:
    name: iOS unit tests
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: ios

      - name: Select simulator
        id: simulator
        run: echo "destination=$(python3 scripts/select_ios_destination.py)" >> "$GITHUB_OUTPUT"

      - name: Run iOS unit tests with coverage
        run: |
          mkdir -p build/ios
          xcodebuild test \
            -project ios/UniversalDownloader.xcodeproj \
            -scheme UniversalDownloader \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -only-testing:UniversalDownloaderTests \
            -enableCodeCoverage YES \
            -resultBundlePath build/ios/UniversalDownloaderUnitTests.xcresult

      - name: Export iOS unit coverage
        run: |
          mkdir -p build/coverage/ios
          xcrun xccov view --report --json build/ios/UniversalDownloaderUnitTests.xcresult > build/coverage/ios/coverage.json
          python3 scripts/ios_coverage_report.py \
            --input build/coverage/ios/coverage.json \
            --output build/coverage/ios \
            --threshold 100 \
            --include "/Shared/"

      - name: Upload iOS unit test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-unit-xcresult
          path: build/ios/UniversalDownloaderUnitTests.xcresult
          retention-days: 30

      - name: Upload iOS coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-coverage
          path: build/coverage/ios/
          retention-days: 30

  ios-e2e-tests:
    name: iOS e2e tests
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: ios

      - name: Select simulator
        id: simulator
        run: echo "destination=$(python3 scripts/select_ios_destination.py)" >> "$GITHUB_OUTPUT"

      - name: Run iOS UI tests
        run: |
          mkdir -p build/ios
          xcodebuild test \
            -project ios/UniversalDownloader.xcodeproj \
            -scheme UniversalDownloader \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -only-testing:UniversalDownloaderUITests \
            -resultBundlePath build/ios/UniversalDownloaderUITests.xcresult

      - name: Upload iOS UI test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-e2e-xcresult
          path: build/ios/UniversalDownloaderUITests.xcresult
          retention-days: 30

  coverage-dashboard:
    name: Coverage dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://ct4nk3r.github.io/universal-downloader-codex/code-coverage/
    needs:
      - android-unit-tests
      - ios-unit-tests
    if: always() && needs.android-unit-tests.result != 'skipped' && needs.ios-unit-tests.result != 'skipped'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Android coverage
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: android-coverage
          path: coverage-input/android

      - name: Download iOS coverage
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ios-coverage
          path: coverage-input/ios

      - name: Build coverage dashboard
        run: |
          mkdir -p build/coverage
          cp -R coverage-input/android build/coverage/android 2>/dev/null || true
          cp -R coverage-input/ios build/coverage/ios 2>/dev/null || true
          python3 scripts/coverage_dashboard.py \
            --android-csv coverage-input/android/jacocoTestReport.csv \
            --ios-html coverage-input/ios/index.html \
            --output build/coverage/dashboard
          cat > build/coverage/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=dashboard/">
            <title>Universal Downloader Coverage</title>
          </head>
          <body>
            <p><a href="dashboard/">Coverage dashboard</a></p>
          </body>
          </html>
          HTML
          touch build/coverage/.nojekyll
          mkdir -p build/pages
          cp -R build/coverage build/pages/code-coverage
          cat > build/pages/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=code-coverage/">
            <title>Universal Downloader Coverage</title>
          </head>
          <body>
            <p><a href="code-coverage/">Code coverage dashboard</a></p>
          </body>
          </html>
          HTML
          touch build/pages/.nojekyll

      - name: Upload coverage dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-dashboard
          path: build/coverage/
          retention-days: 30

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload coverage dashboard to Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/pages/

      - name: Deploy coverage dashboard to Pages
        id: deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
